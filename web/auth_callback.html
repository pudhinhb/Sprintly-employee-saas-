<!DOCTYPE html>
<html>
<head>
    <title>Authentication Callback - TaskOps Employee</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            backdrop-filter: blur(10px);
            max-width: 400px;
            width: 100%;
        }
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .success {
            color: #4ade80;
        }
        .error {
            color: #f87171;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Processing Authentication...</h2>
        <p id="status">Please wait while we process your authentication.</p>
    </div>

    <script>
        // Handle Supabase authentication callback
        async function handleAuthCallback() {
            try {
                console.log('🔍 Processing auth callback...');
                console.log('Current URL:', window.location.href);
                console.log('Search params:', window.location.search);
                console.log('Hash params:', window.location.hash);
                
                // Get the current URL parameters
                const urlParams = new URLSearchParams(window.location.search);
                const hashParams = new URLSearchParams(window.location.hash.substring(1));
                
                // Check for authentication tokens
                const accessToken = urlParams.get('access_token') || hashParams.get('access_token');
                const refreshToken = urlParams.get('refresh_token') || hashParams.get('refresh_token');
                const error = urlParams.get('error') || hashParams.get('error');
                const errorDescription = urlParams.get('error_description') || hashParams.get('error_description');
                const type = urlParams.get('type') || hashParams.get('type');
                
                console.log('Access token found:', !!accessToken);
                console.log('Refresh token found:', !!refreshToken);
                console.log('Error:', error);
                console.log('Type:', type);
                console.log('All URL params:', Object.fromEntries(urlParams));
                console.log('All hash params:', Object.fromEntries(hashParams));
                
                if (error) {
                    // Handle authentication error
                    console.error('Auth error:', error, errorDescription);
                    document.getElementById('status').innerHTML = 
                        `<span class="error">Authentication Error: ${errorDescription || error}</span>`;
                    setTimeout(() => {
                        window.location.href = '/#/login';
                    }, 3000);
                    return;
                }
                
                if (accessToken && refreshToken) {
                    // Store tokens in localStorage for the Flutter app to use
                    localStorage.setItem('supabase_access_token', accessToken);
                    localStorage.setItem('supabase_refresh_token', refreshToken);
                    
                    // Initialize Supabase client to check session
                    const supabaseUrl = 'https://enascccihufvmbwxdcql.supabase.co';
                    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVuYXNjY2NpaHVmdm1id3hkY3FsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQzOTI3MjcsImV4cCI6MjA2OTk2ODcyN30.qBXt_d27izDhQ24s0jGhm53Ag2eulIKwI6EUpTLuo2I';
                    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
                    
                    // Set the session with the tokens
                    await supabase.auth.setSession({
                        access_token: accessToken,
                        refresh_token: refreshToken
                    });
                    
                    // Get the current session to check if it's a password reset
                    const { data: { session } } = await supabase.auth.getSession();
                    
                    console.log('✅ Tokens stored, session:', session);
                    
                    // Check if this is a password reset session
                    let isPasswordReset = false;
                    
                    // Method 1: Check URL parameters
                    if (type === 'recovery' || 
                        type === 'password_reset' ||
                        window.location.href.includes('password') ||
                        window.location.href.includes('reset') ||
                        window.location.href.includes('recovery')) {
                        isPasswordReset = true;
                        console.log('Password reset detected via URL parameters');
                    }
                    
                    // Method 2: Check session metadata
                    if (session && session.user) {
                        const userMetadata = session.user.user_metadata || {};
                        const appMetadata = session.user.app_metadata || {};
                        
                        console.log('User metadata:', userMetadata);
                        console.log('App metadata:', appMetadata);
                        
                        if (userMetadata.recovery === true || 
                            userMetadata.password_reset === true ||
                            appMetadata.recovery === true ||
                            appMetadata.password_reset === true) {
                            isPasswordReset = true;
                            console.log('Password reset detected via session metadata');
                        }
                    }
                    
                    // Method 3: Check if user was just created (password reset flow)
                    if (session && session.user) {
                        const createdAt = new Date(session.user.created_at);
                        const now = new Date();
                        const timeDiff = now - createdAt;
                        
                        // If user was created less than 5 minutes ago, likely a password reset
                        if (timeDiff < 5 * 60 * 1000) {
                            isPasswordReset = true;
                            console.log('Password reset detected via recent user creation');
                        }
                    }
                    
                    console.log('Final isPasswordReset:', isPasswordReset);
                    
                    // Fallback: If we're in auth_callback.html, it's likely a password reset
                    // since normal logins don't typically go through this callback
                    if (!isPasswordReset) {
                        console.log('No password reset indicators found, but assuming password reset since we\'re in auth_callback.html');
                        isPasswordReset = true;
                    }
                    
                    if (isPasswordReset) {
                        document.getElementById('status').innerHTML = 
                            '<span class="success">Password reset session detected! Redirecting to password reset...</span>';
                        
                        // Redirect to the password reset screen
                        setTimeout(() => {
                            window.location.href = '/#/supabase-password-reset';
                        }, 2000);
                    } else {
                        document.getElementById('status').innerHTML = 
                            '<span class="success">Authentication successful! Redirecting to dashboard...</span>';
                        
                        // Redirect to dashboard for normal login
                        setTimeout(() => {
                            window.location.href = '/#/dashboard';
                        }, 2000);
                    }
                } else {
                    // No tokens found, redirect to login
                    console.log('❌ No tokens found, redirecting to login...');
                    document.getElementById('status').innerHTML = 
                        '<span class="error">No authentication tokens found. Redirecting to login...</span>';
                    setTimeout(() => {
                        window.location.href = '/#/login';
                    }, 3000);
                }
            } catch (error) {
                console.error('Auth callback error:', error);
                document.getElementById('status').innerHTML = 
                    '<span class="error">An error occurred. Redirecting to login...</span>';
                setTimeout(() => {
                    window.location.href = '/#/login';
                }, 3000);
            }
        }
        
        // Run the callback handler when the page loads
        document.addEventListener('DOMContentLoaded', handleAuthCallback);
    </script>
</body>
</html>
