<!DOCTYPE html>
<html>
<head>
    <title>Test Password Reset - TaskOps Employee</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            backdrop-filter: blur(10px);
            max-width: 600px;
            width: 100%;
        }
        .form-group {
            margin-bottom: 1rem;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background-color: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }
        .debug-info {
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
            text-align: left;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Test Password Reset</h2>
        <p>This page helps debug password reset issues.</p>
        
        <form id="testForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email">
            </div>
            
            <button type="submit" class="btn" id="testBtn">
                Send Test Password Reset
            </button>
        </form>
        
        <div id="result"></div>
        <div id="debug" class="debug-info"></div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        // Initialize Supabase
        const supabaseUrl = 'https://enascccihufvmbwxdcql.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVuYXNjY2NpaHVmdm1id3hkY3FsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQzOTI3MjcsImV4cCI6MjA2OTk2ODcyN30.qBXt_d27izDhQ24s0jGhm53Ag2eulIKwI6EUpTLuo2I';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // Debug current URL
        function debugCurrentURL() {
            const debugDiv = document.getElementById('debug');
            debugDiv.innerHTML = `
                <h4>Current URL Debug Info:</h4>
                <p><strong>Full URL:</strong> ${window.location.href}</p>
                <p><strong>Search Params:</strong> ${window.location.search}</p>
                <p><strong>Hash Params:</strong> ${window.location.hash}</p>
                <p><strong>Pathname:</strong> ${window.location.pathname}</p>
                
                <h4>URL Parameters:</h4>
                <p><strong>access_token:</strong> ${new URLSearchParams(window.location.search).get('access_token') || 'Not found'}</p>
                <p><strong>refresh_token:</strong> ${new URLSearchParams(window.location.search).get('refresh_token') || 'Not found'}</p>
                <p><strong>type:</strong> ${new URLSearchParams(window.location.search).get('type') || 'Not found'}</p>
                <p><strong>error:</strong> ${new URLSearchParams(window.location.search).get('error') || 'Not found'}</p>
                
                <h4>Hash Parameters:</h4>
                <p><strong>access_token:</strong> ${new URLSearchParams(window.location.hash.substring(1)).get('access_token') || 'Not found'}</p>
                <p><strong>refresh_token:</strong> ${new URLSearchParams(window.location.hash.substring(1)).get('refresh_token') || 'Not found'}</p>
                <p><strong>type:</strong> ${new URLSearchParams(window.location.hash.substring(1)).get('type') || 'Not found'}</p>
                <p><strong>error:</strong> ${new URLSearchParams(window.location.hash.substring(1)).get('error') || 'Not found'}</p>
            `;
        }

        // Handle form submission
        document.getElementById('testForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const resultDiv = document.getElementById('result');
            
            try {
                resultDiv.innerHTML = '<p>Sending password reset email...</p>';
                
                // Send password reset email
                const { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: 'https://webnoxsprintlyemployee.netlify.app/auth_callback.html'
                });
                
                if (error) {
                    resultDiv.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
                } else {
                    resultDiv.innerHTML = `<p style="color: green;">Password reset email sent! Check your email and click the link to see what parameters are passed.</p>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        });

        // Run debug on page load
        document.addEventListener('DOMContentLoaded', debugCurrentURL);
    </script>
</body>
</html>
