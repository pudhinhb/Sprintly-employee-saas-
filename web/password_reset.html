<!DOCTYPE html>
<html>
<head>
    <title>Password Reset - TaskOps Employee</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            backdrop-filter: blur(10px);
            max-width: 400px;
            width: 100%;
        }
        .form-group {
            margin-bottom: 1rem;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        .btn {
            width: 100%;
            padding: 12px;
            background-color: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }
        .btn:hover {
            background-color: #4338ca;
        }
        .btn:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }
        .error {
            color: #f87171;
            background-color: rgba(248, 113, 113, 0.1);
            padding: 12px;
            border-radius: 8px;
            margin: 1rem 0;
            border: 1px solid rgba(248, 113, 113, 0.3);
        }
        .success {
            color: #10b981;
            background-color: rgba(16, 185, 129, 0.1);
            padding: 12px;
            border-radius: 8px;
            margin: 1rem 0;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 2px solid white;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Reset Password</h2>
        <p>Set your new password below.</p>
        
        <form id="passwordResetForm">
            <div class="form-group">
                <label for="newPassword">New Password *</label>
                <input type="password" id="newPassword" name="newPassword" required minlength="8">
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">Confirm Password *</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required minlength="8">
            </div>
            
            <button type="submit" class="btn" id="submitBtn">
                <span id="btnText">Update Password</span>
            </button>
        </form>
        
        <div id="message"></div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        // Initialize Supabase
        const supabaseUrl = 'https://enascccihufvmbwxdcql.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVuYXNjY2NpaHVmdm1id3hkY3FsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQzOTI3MjcsImV4cCI6MjA2OTk2ODcyN30.qBXt_d27izDhQ24s0jGhm53Ag2eulIKwI6EUpTLuo2I';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // Check if user is authenticated
        document.addEventListener('DOMContentLoaded', async function() {
            const { data: { session } } = await supabase.auth.getSession();
            
            if (!session) {
                showError('No active session found. Please try the password reset link again.');
                return;
            }
            
            // User is authenticated, show the form
            console.log('User authenticated:', session.user.email);
        });

        // Handle form submission
        document.getElementById('passwordResetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Validate passwords
            if (newPassword !== confirmPassword) {
                showError('Passwords do not match.');
                return;
            }
            
            if (newPassword.length < 8) {
                showError('Password must be at least 8 characters long.');
                return;
            }
            
            // Show loading state
            setLoading(true);
            
            try {
                // Update password
                const { error } = await supabase.auth.updateUser({
                    password: newPassword
                });
                
                if (error) {
                    showError('Failed to update password: ' + error.message);
                } else {
                    showSuccess('Password updated successfully! You can now login with your new password.');
                    
                    // Redirect to login after 3 seconds
                    setTimeout(() => {
                        window.location.href = '/#/login';
                    }, 3000);
                }
            } catch (error) {
                showError('An error occurred: ' + error.message);
            } finally {
                setLoading(false);
            }
        });
        
        function setLoading(loading) {
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            
            if (loading) {
                submitBtn.disabled = true;
                btnText.innerHTML = '<span class="spinner"></span>Updating...';
            } else {
                submitBtn.disabled = false;
                btnText.textContent = 'Update Password';
            }
        }
        
        function showError(message) {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = `<div class="error">${message}</div>`;
        }
        
        function showSuccess(message) {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = `<div class="success">${message}</div>`;
        }
    </script>
</body>
</html>
