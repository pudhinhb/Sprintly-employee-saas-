server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Prevent caching of HTML and main entry (so browser always gets latest JS references)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Flutter Web: prevent browser from serving old JS/CSS/fonts (mandatory for deployments)
    # Font files must not be cached long-term as Flutter regenerates icon fonts on each build
    location ~* \.(js|css|woff|woff2|ttf|otf)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Long cache for immutable image assets and wasm - Flutter hashes filenames
    location ~* \.(png|jpg|jpeg|gif|ico|svg|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    location ~* \.json$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
